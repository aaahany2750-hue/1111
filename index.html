<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>آلة حاسبة علمية - نمط fx-991EX</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" aria-label="Scientific Calculator">
    <section class="display-wrap">
      <div id="expression" class="expression" aria-live="polite"></div>
      <div id="display" class="display" aria-live="assertive">0</div>
    </section>

    <section class="controls">
      <button data-action="mode-deg">DEG</button>
      <button data-action="mode-rad">RAD</button>
      <button data-action="clear">AC</button>
      <button data-action="delete">DEL</button>
      <button data-value="(">(</button>
      <button data-value=")">)</button>

      <button data-func="sin">sin</button>
      <button data-func="cos">cos</button>
      <button data-func="tan">tan</button>
      <button data-func="asin">sin⁻¹</button>
      <button data-func="acos">cos⁻¹</button>
      <button data-func="atan">tan⁻¹</button>

      <button data-func="log">log</button>
      <button data-func="ln">ln</button>
      <button data-func="sqrt">√</button>
      <button data-op="^">xʸ</button>
      <button data-op="!">x!</button>
      <button data-func="abs">|x|</button>

      <button data-const="PI">π</button>
      <button data-const="E">e</button>
      <button data-func="exp">EXP</button>
      <button data-op="%">%</button>
      <button data-op="/">÷</button>
      <button data-op="*">×</button>

      <button data-digit="7">7</button>
      <button data-digit="8">8</button>
      <button data-digit="9">9</button>
      <button data-op="-">−</button>
      <button data-digit="4">4</button>
      <button data-digit="5">5</button>

      <button data-digit="6">6</button>
      <button data-op="+">+</button>
      <button data-digit="1">1</button>
      <button data-digit="2">2</button>
      <button data-digit="3">3</button>
      <button data-digit="0" class="zero">0</button>

      <button data-digit=".">.</button>
      <button data-action="ans">Ans</button>
      <button data-action="equals" class="equals">=</button>
    </section>

    <p class="hint">الاختصارات: Enter =، Backspace = DEL، Esc = AC</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
